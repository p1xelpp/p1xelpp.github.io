<!DOCTYPE html>
<html>
<head>
<title>public vpkg repo</title>
</head>
<body>
<h1>welcome to actally, just a repo for pkg's, but will put download links for the main program to install</h1>

<p>
V         V
 V       V
  V     V
   V   V
    V V
     V

</p>

  
<p>download newest(?) version of vpkg and the deps (except for bash >:)  )</p>
<p>download <a href="https://github.com/p1xelpp/vpkg/releases/download/really_old_ver.2/vpkg_bundle.zip" target="_blank">here</a></p>

<p>packages:</p>
  <ul id="pkglist"></ul>

<script>
fetch("index.json")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("pkglist");
    data.packages.forEach(pkg => {
      const li = document.createElement("li");
      li.innerHTML = `<b>${pkg.name}</b> — <a href="${pkg.url}">download</a>`;
      list.appendChild(li);
    });
  })
  .catch(err => {
    document.getElementById("pkglist").innerHTML = "Failed to load package list.";
  });
</script>
<h2>Repository Files</h2>
<ul id="filelist"></ul>

<script>
const repoOwner = "p1xelpp";
const repoName = "p1xelpp.github.io";

fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`)
  .then(r => r.json())
  .then(files => {
    const list = document.getElementById("filelist");

    files.forEach(file => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="${file.path}">${file.name}</a>`;
      list.appendChild(li);
    });
  })
  .catch(err => {
    document.getElementById("filelist").innerHTML = "Failed to load file list.";
  });
</script>
<h2>Packages Folder</h2>
<ul id="pkgfolder"></ul>

<script>
fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/packages`)
  .then(r => r.json())
  .then(files => {
    const list = document.getElementById("pkgfolder");

    files.forEach(file => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="packages/${file.name}">${file.name}</a>`;
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
